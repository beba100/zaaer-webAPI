<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoice Preview</title>
    <link rel="stylesheet" href="Lib/css/dx.common.css">
    <link data-theme="material.blue.light.compact" rel="dx-theme" href="Lib/css/dx.material.blue.light.compact.css">
    <script src="/js/core/pms-dx-theme-boot.js?v=20260609materiallight1"></script>
    <link rel="stylesheet" href="css/pms-theme.css?v=20260530p">
    <link rel="stylesheet" href="css/pms-grid-compact.css?v=20260530g">
    <style>
        body.pms-ui {
            margin: 0;
            min-height: 100vh;
            background: var(--pms-page-bg, #eceff3);
        }

        .invoice-viewer-shell {
            max-width: 1200px;
            margin: 0 auto;
            padding: 16px;
        }

        .invoice-viewer-toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
            padding: 12px 14px;
            background: var(--pms-surface, #fff);
            border: 1px solid var(--pms-border, #d9dee7);
            border-radius: var(--pms-radius-card, 14px);
            box-shadow: 0 4px 14px rgba(15, 23, 42, 0.06);
        }

        .invoice-viewer-title {
            font-size: var(--pms-text-lg, 16px);
            font-weight: 600;
            color: #1f2937;
        }

        .invoice-viewer-frame-wrap {
            background: var(--pms-surface, #fff);
            border: 1px solid var(--pms-border, #d9dee7);
            border-radius: var(--pms-radius-card, 14px);
            overflow: hidden;
            min-height: calc(100vh - 120px);
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
        }

        .invoice-viewer-frame {
            width: 100%;
            height: calc(100vh - 120px);
            border: 0;
            background: #525659;
        }

        .invoice-viewer-status {
            padding: 24px;
            text-align: center;
            color: #64748b;
            font-size: var(--pms-text-md, 14px);
        }
        @media (max-width: 640px) {
            .invoice-viewer-shell {
                padding: 8px;
            }

            .invoice-viewer-toolbar {
                flex-direction: column;
                align-items: stretch;
            }

            .invoice-viewer-frame-wrap {
                min-height: calc(100vh - 140px);
                border-radius: 10px;
            }

            .invoice-viewer-frame {
                height: calc(100vh - 140px);
            }

            .invoice-viewer-title {
                font-size: 14px;
                text-align: center;
            }
        }
    </style>
</head>
<body class="pms-ui">
    <div class="invoice-viewer-shell">
        <div class="invoice-viewer-toolbar">
            <div class="invoice-viewer-title" id="viewerTitle">������ ��������</div>
            <div id="viewerActions"></div>
        </div>
        <div class="invoice-viewer-frame-wrap">
            <div class="invoice-viewer-status" id="viewerStatus">���� ����� ��������...</div>
            <iframe id="pdfFrame" class="invoice-viewer-frame" title="Invoice PDF" hidden></iframe>
        </div>
    </div>

    <script src="Lib/js/jquery.min.js"></script>
    <script src="Lib/js/dx.all.js"></script>
    <script src="js/core/devextreme-license.js"></script>
    <script src="js/i18n/en.js?v=20260524f"></script>
    <script src="js/i18n/ar.js?v=20260525b"></script>
    <script src="js/core/localization-service.js"></script>
    <script src="js/core/pms-grid-options.js?v=20260530g"></script>
    <script src="js/core/api-service.js?v=20260530a"></script>
    <script>
        (function () {
            "use strict";

            const params = new URLSearchParams(window.location.search);
            const zaaerId = params.get("zaaerId");
            const internalInvoiceId = params.get("invoiceId");
            const queryHotelCode = params.get("hotelCode");
            const api = window.Zaaer && window.Zaaer.ApiService;

            function t(key, fallback) {
                if (window.Zaaer && window.Zaaer.LocalizationService && typeof window.Zaaer.LocalizationService.t === "function") {
                    const value = window.Zaaer.LocalizationService.t(key);
                    return value && value !== key ? value : fallback;
                }
                return fallback;
            }

            function fail(message) {
                document.getElementById("viewerStatus").textContent = message;
            }

            function resolvePrintUrl() {
                if (zaaerId) {
                    return "/api/v1/pms/invoices/by-zaaer/" + encodeURIComponent(zaaerId) + "/print";
                }
                if (internalInvoiceId) {
                    return "/api/v1/pms/invoices/" + encodeURIComponent(internalInvoiceId) + "/print";
                }
                return null;
            }

            if (!api || typeof api.requireToken !== "function" || !api.requireToken()) {
                return;
            }

            if (queryHotelCode && typeof api.setHotelCode === "function") {
                api.setHotelCode(queryHotelCode);
            }

            const printUrl = resolvePrintUrl();
            const displayId = zaaerId || internalInvoiceId;
            if (!printUrl || !displayId) {
                fail(t("reservationDetail.payments.invoice.printFailed", "Missing invoice id."));
                return;
            }

            document.getElementById("viewerTitle").textContent =
                t("reservationDetail.payments.invoice.preview", "Invoice preview") +
                " #" +
                displayId;

            $("#viewerActions").dxButton({
                text: t("reservationDetail.payments.invoice.print", "Print"),
                icon: "print",
                type: "default",
                stylingMode: "contained",
                onClick: function () {
                    const frame = document.getElementById("pdfFrame");
                    if (frame && frame.contentWindow) {
                        try {
                            frame.contentWindow.print();
                        } catch {
                            window.print();
                        }
                    }
                }
            });

            api.getBlob(printUrl)
                .then(function (blob) {
                    const url = URL.createObjectURL(blob);
                    const frame = document.getElementById("pdfFrame");
                    frame.src = url;
                    frame.hidden = false;
                    document.getElementById("viewerStatus").hidden = true;
                    window.setTimeout(function () {
                        URL.revokeObjectURL(url);
                    }, 120000);
                })
                .catch(function () {
                    fail(t("reservationDetail.payments.invoice.printFailed", "Could not load invoice PDF."));
                });
        })();
    </script>
</body>
</html>
