<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resort Ticket Preview</title>
    <link rel="stylesheet" href="Lib/css/dx.common.css">
    <link data-theme="material.blue.light.compact" rel="dx-theme" href="Lib/css/dx.material.blue.light.compact.css">
    <script src="/js/core/pms-dx-theme-boot.js?v=20260609materiallight1"></script>
    <link rel="stylesheet" href="css/pms-theme.css?v=20260530p">
    <link rel="stylesheet" href="css/pms-grid-compact.css?v=20260530g">
    <style>
        body.pms-ui {
            margin: 0;
            min-height: 100vh;
            background: var(--pms-page-bg, #eceff3);
        }

        .ticket-viewer-shell {
            max-width: 980px;
            margin: 0 auto;
            padding: 16px;
        }

        .ticket-viewer-toolbar,
        .ticket-viewer-frame-wrap {
            background: var(--pms-surface, #fff);
            border: 1px solid var(--pms-border, #d9dee7);
            border-radius: var(--pms-radius-card, 14px);
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
        }

        .ticket-viewer-toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
            padding: 12px 14px;
        }

        .ticket-viewer-title {
            font-size: var(--pms-text-lg, 16px);
            font-weight: 600;
            color: #1f2937;
        }

        .ticket-viewer-frame-wrap {
            overflow: hidden;
            min-height: calc(100vh - 120px);
        }

        .ticket-viewer-frame {
            width: 100%;
            height: calc(100vh - 120px);
            border: 0;
            background: #525659;
        }

        .ticket-viewer-status {
            padding: 24px;
            text-align: center;
            color: #64748b;
            font-size: var(--pms-text-md, 14px);
        }
    </style>
</head>
<body class="pms-ui">
    <div class="ticket-viewer-shell">
        <div class="ticket-viewer-toolbar">
            <div class="ticket-viewer-title" id="viewerTitle">Resort ticket preview</div>
            <div id="viewerActions"></div>
        </div>
        <div class="ticket-viewer-frame-wrap">
            <div class="ticket-viewer-status" id="viewerStatus">Loading ticket...</div>
            <iframe id="pdfFrame" class="ticket-viewer-frame" title="Resort Ticket PDF" hidden></iframe>
        </div>
    </div>

    <script src="Lib/js/jquery.min.js"></script>
    <script src="Lib/js/dx.all.js"></script>
    <script src="js/core/devextreme-license.js"></script>
    <script src="js/i18n/en.js?v=20260609resorttickets1"></script>
    <script src="js/i18n/ar.js?v=20260609resorttickets1"></script>
    <script src="js/core/localization-service.js"></script>
    <script src="js/core/api-service.js?v=20260530a"></script>
    <script>
        (function () {
            "use strict";

            const params = new URLSearchParams(window.location.search);
            const src = params.get("src");
            const hotelCode = params.get("hotelCode");
            const api = window.Zaaer && window.Zaaer.ApiService;

            function t(key, fallback) {
                if (window.Zaaer && window.Zaaer.LocalizationService && typeof window.Zaaer.LocalizationService.t === "function") {
                    const value = window.Zaaer.LocalizationService.t(key);
                    return value && value !== key ? value : fallback;
                }
                return fallback;
            }

            function fail(message) {
                document.getElementById("viewerStatus").textContent = message;
            }

            if (!api || typeof api.requireToken !== "function" || !api.requireToken()) {
                fail(t("roomBoard.resortTickets.printFailed", "Could not load ticket PDF."));
                return;
            }

            if (hotelCode && typeof api.setHotelCode === "function") {
                api.setHotelCode(hotelCode);
            }

            if (!src) {
                fail(t("roomBoard.resortTickets.printFailed", "Missing ticket print URL."));
                return;
            }

            document.getElementById("viewerTitle").textContent =
                t("roomBoard.resortTickets.preview", "Resort ticket preview");

            $("#viewerActions").dxButton({
                text: t("roomBoard.resortTickets.print", "Print"),
                icon: "print",
                type: "default",
                stylingMode: "contained",
                onClick: function () {
                    const frame = document.getElementById("pdfFrame");
                    if (frame && frame.contentWindow) {
                        try {
                            frame.contentWindow.print();
                        } catch {
                            window.print();
                        }
                    }
                }
            });

            api.getBlob(src)
                .then(function (blob) {
                    const url = URL.createObjectURL(blob);
                    const frame = document.getElementById("pdfFrame");
                    frame.src = url;
                    frame.hidden = false;
                    document.getElementById("viewerStatus").hidden = true;
                    window.setTimeout(function () {
                        URL.revokeObjectURL(url);
                    }, 120000);
                })
                .catch(function () {
                    fail(t("roomBoard.resortTickets.printFailed", "Could not load ticket PDF."));
                });
        })();
    </script>
</body>
</html>
