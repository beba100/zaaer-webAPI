<!DOCTYPE html>

<html lang="ar" dir="rtl">

<head>

    <meta charset="utf-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Role permissions</title>

    <link rel="stylesheet" href="/Lib/css/dx.common.css">

    <link data-theme="fluent.saas.light.compact" rel="dx-theme" href="/Lib/css/dx.fluent.saas.light.compact.css">
    <script src="/js/core/pms-dx-theme-boot.js?v=20260609materiallight1"></script>

    <link rel="stylesheet" href="/css/room-board.css?v=20260616navCompact4">

    <link rel="stylesheet" href="/css/pms-theme.css?v=20260530p">

    <link rel="stylesheet" href="/css/pms-grid-compact.css?v=20260530g">

    <link rel="stylesheet" href="/css/pms-admin.css">

    <link rel="stylesheet" href="/css/pms-role-permissions.css?v=20260614rolepermshotel">

</head>

<body class="pms-ui pms-admin-page pms-role-perms-page"

      data-rbac-nav-key="nav-rbac-roles">

    <main class="room-board-shell">

        <aside class="room-board-sidebar" id="roomBoardSidebar" aria-label="PMS navigation">

            <div class="room-board-brand">

                <span class="dx-icon dx-icon-home"></span>

                <div>

                    <strong>Aleairy PMS</strong>

                    <small>Enterprise Edition</small>

                </div>

            </div>

            <div id="roomBoardNavTree" class="room-board-nav-tree"></div>

            <div class="room-board-hotel-card">

                <span class="dx-icon dx-icon-home"></span>

                <div>

                    <strong>Aleairy PMS</strong>

                    <small id="businessDateText"></small>

                </div>

            </div>

        </aside>



        <section class="room-board-workspace">

            <header class="room-board-header">

                <div class="room-board-breadcrumb">

                    <button type="button" class="room-board-nav-toggle" id="roomBoardNavToggle" aria-expanded="true" aria-controls="roomBoardSidebar">

                        <span class="dx-icon dx-icon-menu" aria-hidden="true"></span>

                        <span data-i18n="roomBoard.dashboard"></span>

                    </button>

                    <span class="dx-icon dx-icon-chevronright room-board-bc-sep" aria-hidden="true"></span>
                    <div id="pmsHeaderHotelPicker" class="pms-header-hotel-picker pms-header-hotel-picker--breadcrumb"></div>
                    <span class="dx-icon dx-icon-chevronright room-board-bc-sep pms-role-perms-bc-sep" aria-hidden="true" hidden></span>

                    <div class="pms-role-perms-bc-title" hidden>

                        <strong id="pageTitle" class="room-board-bc-current"></strong>

                    </div>

                </div>

                <div class="room-board-top-actions">

                    <span id="adminHotelBadge" class="pms-admin-hotel-badge" hidden></span>

                    <div id="adminRefreshButton"></div>

                    <div id="userAccountMenu" class="pms-user-account-menu"></div>

                </div>

            </header>



            <section class="pms-admin-workspace pms-role-perms-workspace">

                <header class="pms-role-perms-toolbar">

                    <div class="pms-role-perms-toolbar-start">

                        <div id="rolePermsBackButton"></div>

                        <div class="pms-role-perms-heading">

                            <h1 id="rolePermsTitle" class="pms-role-perms-title"></h1>

                            <p id="rolePermsSummary" class="pms-role-perms-summary"></p>

                        </div>

                    </div>

                </header>



                <section class="pms-admin-card pms-role-perms-card">

                    <div class="pms-role-perms-master">

                        <div class="pms-role-perms-master-start">
                            <div id="rolePermsSelectAll"></div>
                            <div id="rolePermsAccordionActions" class="pms-role-perms-accordion-actions"></div>
                        </div>

                        <span id="rolePermsCount" class="pms-role-perms-count"></span>

                    </div>

                    <div id="rolePermsCards" class="pms-role-perms-cards" role="list"></div>

                </section>



                <footer class="pms-role-perms-footer" aria-label="Save permissions">

                    <div class="pms-role-perms-footer-inner">

                        <span id="rolePermsFooterMeta" class="pms-role-perms-footer-meta"></span>

                        <div id="rolePermsSaveButton" class="pms-role-perms-footer-save"></div>

                    </div>

                </footer>

            </section>

        </section>

    </main>



    <script src="/Lib/js/jquery.min.js"></script>

    <script src="/Lib/js/dx.all.js"></script>

    <script src="/js/core/devextreme-license.js"></script>

    <script src="/Lib/js/localization/dx.messages.en.js"></script>

    <script src="/Lib/js/localization/dx.messages.ar.js"></script>

    <script src="/js/i18n/en.js"></script>

    <script src="/js/i18n/ar.js"></script>

    <script src="/js/core/localization-service.js"></script>
    <script src="/js/core/pms-grid-options.js?v=20260530g"></script>

    <script src="/js/core/api-service.js?v=20260614jwtfix"></script>
    <script src="/js/core/pms-save-guard.js?v=20260525"></script>

    <script src="/js/core/pms-rbac-nav.js?v=20260528a"></script>

    <script src="/js/core/pms-theme-switcher.js?v=20260609materiallight1"></script>
    <script src="/js/core/pms-top-chrome.js?v=20260530a"></script>

    <script src="/js/core/pms-admin-shell.js?v=20260616navCompact4"></script>

    <script src="/js/pages/role-permissions.js?v=20260614rolepermshotel"></script>

</body>

</html>
