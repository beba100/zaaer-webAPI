<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel reports</title>
    <link rel="stylesheet" href="/Lib/css/dx.common.css">
    <link data-theme="fluent.saas.light.compact" rel="dx-theme" href="/Lib/css/dx.fluent.saas.light.compact.css">
    <script src="/js/core/pms-dx-theme-boot.js?v=20260616reportsHub1"></script>
    <link rel="stylesheet" href="/css/room-board.css?v=20260616navCompact4">
    <link rel="stylesheet" href="/css/pms-theme.css?v=20260616reportsHub1">
    <link rel="stylesheet" href="/css/pms-admin.css">
    <link rel="stylesheet" href="/css/hotel-reports-hub.css?v=20260616reportsHub4">
    <link rel="stylesheet" href="/css/pms-grid-compact.css?v=20260616g">
</head>
<body class="pms-ui pms-admin-page"
      data-rbac-nav-key="nav-hotel-reports-group"
      data-rbac-title-key="hotelReports.hub.title">
    <main class="room-board-shell">
        <aside class="room-board-sidebar" id="roomBoardSidebar" aria-label="PMS navigation">
            <div class="room-board-brand">
                <span class="dx-icon dx-icon-home"></span>
                <div><strong>Aleairy PMS</strong><small>Enterprise Edition</small></div>
            </div>
            <div id="roomBoardNavTree" class="room-board-nav-tree"></div>
            <div class="room-board-hotel-card">
                <span class="dx-icon dx-icon-home"></span>
                <div><strong>Aleairy PMS</strong><small id="businessDateText"></small></div>
            </div>
        </aside>
        <section class="room-board-workspace">
            <header class="room-board-header">
                <div class="room-board-breadcrumb">
                    <button type="button" class="room-board-nav-toggle" id="roomBoardNavToggle" aria-expanded="true" aria-controls="roomBoardSidebar">
                        <span class="dx-icon dx-icon-menu"></span>
                        <span data-i18n="roomBoard.dashboard"></span>
                    </button>
                    <span class="dx-icon dx-icon-chevronright room-board-bc-sep" aria-hidden="true"></span>
                    <div id="pmsHeaderHotelPicker" class="pms-header-hotel-picker pms-header-hotel-picker--breadcrumb"></div>
                </div>
                <div class="room-board-top-actions">
                    <span id="adminHotelBadge" class="pms-admin-hotel-badge" hidden></span>
                    <div id="adminRefreshButton"></div>
                    <div id="userAccountMenu" class="pms-user-account-menu"></div>
                </div>
            </header>
            <section class="pms-admin-workspace">
                <div class="pms-admin-card lodging-reports-hub">
                    <div class="lodging-reports-hub__intro">
                        <h1 class="lodging-reports-hub__title" id="hubTitle"></h1>
                        <p class="lodging-reports-hub__subtitle" id="hubSubtitle"></p>
                    </div>
                    <div class="lodging-reports-hub__toolbar">
                        <div id="hubSearch" class="lodging-reports-hub__search"></div>
                    </div>
                    <section id="hubFavoritesSection" hidden>
                        <h2 class="lodging-reports-hub__section-title" id="hubFavoritesTitle"></h2>
                        <div id="hubFavoritesGrid" class="lodging-reports-hub__grid"></div>
                    </section>
                    <section>
                        <h2 class="lodging-reports-hub__section-title" id="hubAllTitle"></h2>
                        <div id="hubReportsGrid" class="lodging-reports-hub__grid"></div>
                        <div id="hubEmpty" class="lodging-reports-hub__empty" hidden></div>
                    </section>
                </div>
            </section>
        </section>
    </main>
    <script src="/Lib/js/jquery.min.js"></script>
    <script src="/Lib/js/dx.all.js"></script>
    <script src="/js/core/devextreme-license.js"></script>
    <script src="/Lib/js/localization/dx.messages.en.js"></script>
    <script src="/Lib/js/localization/dx.messages.ar.js"></script>
    <script src="/js/i18n/en.js?v=20260616reportsHub1"></script>
    <script src="/js/i18n/ar.js?v=20260616reportsHub1"></script>
    <script src="/js/core/localization-service.js?v=20260616reportsHub1"></script>
    <script src="/js/core/api-service.js?v=20260616reportsHub1"></script>
    <script src="/js/core/pms-rbac-nav.js?v=20260616reportsHub1"></script>
    <script src="/js/core/pms-lodging-reports-catalog.js?v=20260616reportsHub1"></script>
    <script src="/js/core/pms-lodging-reports-favorites.js?v=20260616reportsHub3"></script>
    <script src="/js/core/pms-theme-switcher.js?v=20260616reportsHub1"></script>
    <script src="/js/core/pms-top-chrome.js?v=20260616reportsHub1"></script>
    <script src="/js/core/pms-admin-shell.js?v=20260616navCompact4"></script>
    <script src="/js/pages/hotel-reports-hub.js?v=20260616reportsHub3"></script>
</body>
</html>
